name: Build and deploy to exmachina.in/statutes

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # The apex domain (exmachina.in) is served by a separate repo. We push
      # the built `dist/` into that repo's publish branch under `statutes/`,
      # leaving everything else in that repo untouched.
      #
      # Auth: an ed25519 deploy key whose public half is registered (with
      # write access) on the apex repo, and whose private half is stored as
      # the secret APEX_DEPLOY_KEY in *this* repo's settings.
      - name: Deploy /statutes into the apex repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.APEX_DEPLOY_KEY }}
          external_repository: rahulmatthan/rahulmatthan.github.io
          publish_branch: main
          publish_dir: ./dist
          destination_dir: statutes
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy statutes from ${{ github.sha }}'
